name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache-suffix: ${{ matrix.python-version }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --frozen --extra dev --python ${{ matrix.python-version }}
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      - run: uv run python scripts/consistency_lint.py
      - run: >
          uv run pytest
          --cov=src/stonepy/_core
          --cov=src/stonepy/_generator
          --cov=src/stonepy/resources
          --cov=src/stonepy/_endpoints
          --cov=src/stonepy/client.py
          --cov-fail-under=90
      - run: uv build
      - run: uv run twine check dist/*
