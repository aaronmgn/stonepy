name: docs
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish as latest (e.g. 0.1.3). Blank deploys the dev docs."
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.classify.outputs.mode }}
      version: ${{ steps.classify.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Classify docs deployment
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          MODE="dev"
          VERSION=""

          if [ -n "${INPUT_VERSION}" ]; then
            MODE="release"
            VERSION="${INPUT_VERSION}"
          elif [ "${REF_TYPE}" = "tag" ]; then
            MODE="release"
            VERSION="${REF_NAME#v}"
          elif [ "${EVENT_NAME}" = "push" ] && [ "${REF_TYPE}" = "branch" ]; then
            ZERO_SHA="0000000000000000000000000000000000000000"
            if [ -n "${BEFORE_SHA}" ] && [ "${BEFORE_SHA}" != "${ZERO_SHA}" ]; then
              version_at() {
                git show "${1}:src/stonepy/__init__.py" |
                  sed -n 's/^__version__ = "\([^"]*\)"$/\1/p'
              }

              BEFORE_VERSION="$(version_at "${BEFORE_SHA}")"
              CURRENT_VERSION="$(version_at "${CURRENT_SHA}")"
              if [ -z "${BEFORE_VERSION}" ] || [ -z "${CURRENT_VERSION}" ]; then
                echo "could not read __version__ from the push commits" >&2
                exit 1
              fi
              if [ "${BEFORE_VERSION}" != "${CURRENT_VERSION}" ]; then
                MODE="skip"
              fi
            fi
          fi

          if [[ "${VERSION}" == *$'\n'* || "${VERSION}" == *$'\r'* ]]; then
            echo "release version must be a single line" >&2
            exit 1
          fi
          printf 'mode=%s\nversion=%s\n' "${MODE}" "${VERSION}" >> "${GITHUB_OUTPUT}"

  deploy:
    needs: plan
    if: needs.plan.outputs.mode != 'skip'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --frozen --extra docs
      - name: Configure git identity for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Build versioned docs with mike
        env:
          MODE: ${{ needs.plan.outputs.mode }}
          VERSION: ${{ needs.plan.outputs.version }}
        run: |
          set -euo pipefail
          case "${MODE}" in
            release)
              if [ -z "${VERSION}" ]; then
                echo "release docs deployment requires a version" >&2
                exit 1
              fi
              uv run mike deploy --push --update-aliases "${VERSION}" latest
              uv run mike set-default --push latest
              ;;
            dev)
              uv run mike deploy --push dev
              ;;
            *)
              echo "unsupported docs deployment mode: ${MODE}" >&2
              exit 1
              ;;
          esac
      - name: Materialize the gh-pages site
        run: |
          set -euo pipefail
          git fetch origin gh-pages
          rm -rf _site && mkdir _site
          git archive origin/gh-pages | tar -x -C _site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
