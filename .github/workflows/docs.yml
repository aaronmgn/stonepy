name: docs
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish as latest (e.g. 0.1.3). Blank deploys the dev docs."
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --frozen --extra docs
      - name: Configure git identity for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Build versioned docs with mike
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          elif [ "${REF_TYPE}" = "tag" ]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION=""
          fi
          if [ -n "${VERSION}" ]; then
            uv run mike deploy --push --update-aliases "${VERSION}" latest
            uv run mike set-default --push latest
          else
            uv run mike deploy --push dev
          fi
      - name: Materialize the gh-pages site
        run: |
          set -euo pipefail
          git fetch origin gh-pages
          rm -rf _site && mkdir _site
          git archive origin/gh-pages | tar -x -C _site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
