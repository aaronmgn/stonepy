site_name: stonepy
site_description: Typed Python client for the StoneX / City Index (CIAPI) v2 trading API.
site_url: https://aaronmgn.github.io/stonepy/
repo_url: https://github.com/aaronmgn/stonepy
repo_name: aaronmgn/stonepy
copyright: Copyright &copy; 2026 Aaron Morgan

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

watch:
  - src/stonepy

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            members_order: source
            inherited_members: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  version:
    provider: mike

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Guides:
      - Authentication & sessions: guide/authentication.md
      - Configuration: guide/configuration.md
      - Resilience: guide/resilience.md
      - Error handling: guide/error-handling.md
      - Pagination: guide/pagination.md
      - Logging & redaction: guide/logging.md
      - Extensibility: guide/extensibility.md
      - Testing: guide/testing.md
      - Recipes: guide/recipes.md
  - API reference:
      - Overview: API_REFERENCE.md
      - Clients: api/client.md
      - Configuration: api/configuration.md
      - Errors: api/errors.md
      - Resource groups: api/resources.md
      - Models (DTOs):
          - Overview: api/models.md
          - All models: reference/models/
  - Changelog: changelog.md
